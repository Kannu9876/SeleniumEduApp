name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # --- 💡 STEP 1: Pehle API Key inject karo appsettings mein ---
    - name: Inject API Key from Secrets
      run: |
        sed -i 's/DEPLOYMENT_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' wwwroot/appsettings.json

    # --- 💡 STEP 2: Ab App ko publish karo (jisme asli key ja chuki hai) ---
    - name: Publish App
      run: dotnet publish -c Release -o release --nologo

    - uses: actions/configure-pages@v4

    - uses: actions/upload-pages-artifact@v3
      with:
        path: 'release/wwwroot'

    - id: deployment
      uses: actions/deploy-pages@v4
